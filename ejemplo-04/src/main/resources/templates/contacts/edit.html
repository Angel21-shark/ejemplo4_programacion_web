<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Contacto - Agenda Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="#">Agenda Premium</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow-lg border-0 mb-5">
                    <div class="card-header bg-warning">
                        Editar Información del Contacto
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/contacts/save}" th:object="${contact}" method="post">
                            <input type="hidden" th:field="*{id}" />
                            
                            <div class="row g-3">
                                <div class="col-12">
                                    <label for="name" class="form-label">Nombre *</label>
                                    <input type="text" class="form-control" id="name" th:field="*{name}" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="lastName" class="form-label">Primer Apellido *</label>
                                    <input type="text" class="form-control" id="lastName" th:field="*{lastName}" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="secondLastName" class="form-label">Segundo Apellido</label>
                                    <input type="text" class="form-control" id="secondLastName" th:field="*{secondLastName}">
                                </div>
                                <div class="col-12">
                                    <label for="nickName" class="form-label">Apodo</label>
                                    <input type="text" class="form-control" id="nickName" th:field="*{nickName}">
                                </div>
                            </div>
                            
                            <div class="d-flex justify-content-end gap-3 mt-4 pt-3 border-top">
                                <a th:href="@{/contacts}" class="btn btn-outline-light">Cancelar</a>
                                <button type="submit" class="btn btn-primary px-4">Actualizar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/contacts.js}"></script>
</body>
</html>
