<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Medio - Agenda de Angel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="#">Agenda de Angel</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0 mb-5">
                    <div class="card-header bg-warning">
                        Modificar Medio de Contacto
                    </div>
                    <div class="card-body p-4">
                        <div class="mb-4 text-center">
                            <p class="text-muted mb-0">Contacto</p>
                            <h5 class="title-accent" th:text="${contacto.name}"></h5>
                        </div>
                        
                        <form th:action="@{/contacts/{id}/medios/{idMedio}/edit(id=${contacto.id}, idMedio=${medio.id})}" th:object="${medio}" method="post">
                            <div class="mb-4">
                                <label class="form-label">Tipo de Contacto</label>
                                <select class="form-select" th:field="*{idTipoContacto}" required>
                                    <option th:each="tipo : ${tiposContacto}" th:value="${tipo.id}" th:text="${tipo.nombre}"></option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Valor</label>
                                <input type="text" class="form-control" th:field="*{valor}" required>
                            </div>
                            <div class="d-flex justify-content-end gap-3 pt-3 border-top">
                                <a th:href="@{/contacts/{id}/medios(id=${contacto.id})}" class="btn btn-outline-light">Descartar</a>
                                <button type="submit" class="btn btn-primary px-4">Actualizar Medio</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/contacts.js}"></script>
</body>
</html>
