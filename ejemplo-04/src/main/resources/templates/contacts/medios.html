<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Medios de Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="#">Agenda Web</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/contacts}">Mis Contactos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="mb-4">
            <h2>Medios de contacto para: <span th:text="${contacto.name + ' ' + contacto.lastName}"></span></h2>
            <a th:href="@{/contacts}" class="btn btn-outline-secondary btn-sm">&larr; Volver a contactos</a>
        </div>

        <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${mensaje}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row">
            <div class="col-md-5">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white">Agregar Medio de Contacto</div>
                    <div class="card-body">
                        <form th:action="@{/contacts/{id}/medios/save(id=${contacto.id})}" th:object="${nuevoMedio}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Tipo de Contacto</label>
                                <select class="form-select" th:field="*{idTipoContacto}" required>
                                    <option value="" disabled selected>Seleccione un tipo...</option>
                                    <option th:each="tipo : ${tiposContacto}" th:value="${tipo.id}" th:text="${tipo.nombre}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Valor (Número, Email, etc.)</label>
                                <input type="text" class="form-control" th:field="*{valor}" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Guardar</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white">Lista de Medios</div>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item d-flex justify-content-between align-items-center" th:each="medio : ${medios}">
                            <div>
                                <strong th:text="${medio.tipoContactoNombre}">Tipo</strong>: 
                                <span th:text="${medio.valor}">Valor</span>
                            </div>
                            <div>
                                <a th:href="@{/contacts/{idContacto}/medios/{idMedio}/edit(idContacto=${contacto.id}, idMedio=${medio.id})}" class="btn btn-sm btn-warning">Editar</a>
                                <form th:action="@{/contacts/{idContacto}/medios/{idMedio}/delete(idContacto=${contacto.id}, idMedio=${medio.id})}" method="post" class="d-inline delete-form">
                                    <button type="submit" class="btn btn-sm btn-danger">X</button>
                                </form>
                            </div>
                        </li>
                        <li class="list-group-item text-muted" th:if="${medios == null or medios.isEmpty()}">
                            No hay medios registrados.
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/contacts.js}"></script>
</body>
</html>
