<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Contactos</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <!-- Custom CSS from static folder -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="#">Agenda Web</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/contacts}">Mis Contactos</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center" th:if="${session.usuarioSesion != null}">
                    <span class="text-white me-3">Bienvenido, <span th:text="${session.usuarioSesion.name}">User</span></span>
                    <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Directorio de Contactos</h2>
            <a th:href="@{/contacts/new}" class="btn btn-primary">Nuevo Contacto</a>
        </div>

        <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${mensaje}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row">
            <div class="col-md-4" th:each="contact : ${contacts}">
                <div class="contact-card">
                    <h5 th:text="${contact.name + ' ' + contact.lastName + ' ' + (contact.secondLastName != null ? contact.secondLastName : '')}">Nombre</h5>
                    <p class="text-muted mb-2" th:if="${contact.nickName != null && !contact.nickName.isEmpty()}" th:text="'(' + ${contact.nickName} + ')'">Apodo</p>
                    <div class="mt-3">
                        <a th:href="@{/contacts/{id}/medios(id=${contact.id})}" class="btn btn-sm btn-info text-white">Ver Medios</a>
                        <a th:href="@{/contacts/{id}/edit(id=${contact.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <form th:action="@{/contacts/{id}/delete(id=${contact.id})}" method="post" class="d-inline delete-form">
                            <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${contacts == null or contacts.isEmpty()}" class="alert alert-info">
            No tienes contactos registrados aún.
        </div>
    </div>

    <!-- Bootstrap Bundle JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <!-- Custom JS from static folder -->
    <script th:src="@{/js/contacts.js}"></script>
</body>
</html>
