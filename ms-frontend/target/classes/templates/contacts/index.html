<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Contactos - Agenda Premium</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tema Ayu Custom -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="#">Agenda Premium</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/contacts}">Directorio</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center" th:if="${session.usuarioSesion != null}">
                    <span class="navbar-text-welcome me-4">Hola, <span th:text="${session.usuarioSesion.name}">User</span></span>
                    <a th:href="@{/logout}" class="btn btn-sm btn-outline-danger">Cerrar Sesión</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-end mb-4">
            <div>
                <h2 class="mb-1">Mis Contactos</h2>
                <p class="text-muted mb-0">Gestiona y organiza tu agenda personal</p>
            </div>
            <a th:href="@{/contacts/new}" class="btn btn-primary">+ Nuevo Contacto</a>
        </div>

        <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${mensaje}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row g-4">
            <div class="col-md-6 col-lg-4" th:each="contact : ${contacts}">
                <div class="contact-card">
                    <h5 class="mb-1 text-main" th:text="${contact.name + ' ' + contact.lastName + ' ' + (contact.secondLastName != null ? contact.secondLastName : '')}">Nombre</h5>
                    <p class="text-muted mb-3" th:if="${contact.nickName != null && !contact.nickName.isEmpty()}" th:text="'@' + ${contact.nickName}">Apodo</p>
                    
                    <div class="mt-auto pt-3 border-top d-flex gap-2">
                        <a th:href="@{/contacts/{id}/medios(id=${contact.id})}" class="btn btn-sm btn-outline-info flex-grow-1">Medios</a>
                        <a th:href="@{/contacts/{id}/edit(id=${contact.id})}" class="btn btn-sm btn-outline-warning">Editar</a>
                        <form th:action="@{/contacts/{id}/delete(id=${contact.id})}" method="post" class="d-inline delete-form">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <div th:if="${contacts == null or contacts.isEmpty()}" class="alert alert-info mt-4">
            Aún no tienes contactos en tu agenda. Comienza creando uno nuevo.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/contacts.js}"></script>
</body>
</html>
