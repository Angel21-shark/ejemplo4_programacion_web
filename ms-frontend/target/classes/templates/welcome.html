<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Premium - Acceso</title>
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tema Ayu Custom -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0 p-4 text-center">
                    <h2 class="title-accent mb-4">Agenda Premium</h2>
                    
                    <div th:if="${session.usuarioSesion != null}">
                        <h4 class="mb-3 text-main">¡Bienvenido de vuelta, <span class="title-accent" th:text="${session.usuarioSesion.username}">Usuario</span>!</h4>
                        <p class="text-muted mb-4">¿Qué deseas hacer hoy?</p>
                        
                        <div class="d-grid gap-3">
                            <a th:href="@{/contacts}" class="btn btn-primary btn-lg">Acceder a Mis Contactos</a>
                            <a th:href="@{/users}" class="btn btn-outline-secondary">Gestión de Usuarios</a>
                            <a th:href="@{/logout}" class="btn btn-outline-danger mt-2">Cerrar Sesión</a>
                        </div>
                    </div>
                    
                    <div th:if="${session.usuarioSesion == null}">
                        <p class="text-muted mb-4">Parece que no has iniciado sesión o estás viendo el resultado.</p>
                        <div class="alert alert-info">
                            <span th:text="${resultado}"></span>
                        </div>
                        <a th:href="@{/}" class="btn btn-primary w-100">Ir al Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script de Tema Dinámico -->
    <script th:src="@{/js/contacts.js}"></script>
</body>
</html>
